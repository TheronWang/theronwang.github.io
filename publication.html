    window.addEventListener('load', function() {
      var lastModified = new Date(document.lastModified);
      var formattedDate = lastModified.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day : 'numeric' });

    window.addEventListener('load', function() {
